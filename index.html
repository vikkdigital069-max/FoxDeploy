<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoxDeploy |Deploy Cloud</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #ff6b00; 
            --primary-glow: rgba(255, 107, 0, 0.4);
            --bg: #070707;
            --card: rgba(18, 18, 18, 0.85);
            --text: #f0f0f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        /* Video Banner Header */
        .video-header {
            width: 100%; height: 200px; overflow: hidden;
            border-bottom: 3px solid var(--primary);
            box-shadow: 0 5px 20px var(--primary-glow);
        }

        .video-header video {
            width: 100%; height: 100%; object-fit: cover;
            filter: brightness(0.75) contrast(1.1);
        }

        /* Layout Card */
        .container {
            flex: 1; display: flex; justify-content: center; align-items: center;
            width: 100%; padding: 20px;
        }

        .deploy-card {
            background: var(--card);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 107, 0, 0.15);
            padding: 40px; border-radius: 28px;
            width: 100%; max-width: 450px;
            text-align: center; position: relative;
        }

        h1 {
            font-size: 2rem; letter-spacing: 5px; font-weight: 900;
            background: linear-gradient(to bottom, #fff, #777);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .repo-info { color: #555; font-size: 0.75rem; margin-bottom: 30px; letter-spacing: 1px; }

        /* Floating Input Group */
        .input-group { position: relative; margin-bottom: 25px; text-align: left; }

        .cool-input {
            width: 100%; background: #000; border: 1px solid #222;
            padding: 16px 15px 16px 45px; border-radius: 14px;
            color: white; font-size: 1rem; transition: 0.3s;
        }

        .cool-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }

        .input-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #444; }

        .floating-label {
            position: absolute; left: 45px; top: 50%; transform: translateY(-50%);
            color: #666; pointer-events: none; transition: 0.3s;
        }

        .cool-input:focus ~ .floating-label,
        .cool-input:not(:placeholder-shown) ~ .floating-label {
            top: 0; left: 15px; font-size: 0.7rem; color: var(--primary);
            background: #121212; padding: 0 8px; font-weight: bold;
        }

        /* Custom File Input */
        .file-box { width: 100%; background: rgba(0,0,0,0.4); padding: 12px; border-radius: 12px; border: 1px dashed #333; margin-bottom: 25px; }
        .file-box input { color: #666; font-size: 0.8rem; width: 100%; cursor: pointer; }

        /* Launch Button */
        .btn-launch {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 18px; border-radius: 15px; font-weight: 900;
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 10px; transition: 0.3s;
        }

        .btn-launch:hover { transform: translateY(-3px); box-shadow: 0 10px 20px var(--primary-glow); }

        /* Loader Overlay */
        #loader {
            display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 10; flex-direction: column; justify-content: center; align-items: center; border-radius: 28px;
        }

        .ring { width: 50px; height: 50px; border: 4px solid #222; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Success Popup */
        #success {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #0f0f0f; border: 2px solid var(--primary);
            padding: 35px; border-radius: 24px; z-index: 100; text-align: center;
            width: 90%; max-width: 380px; box-shadow: 0 0 50px #000;
        }

        .url-box {
            background: #000; border: 1px solid #333; padding: 12px; border-radius: 10px;
            color: #4ade80; font-family: monospace; font-size: 0.85rem; margin: 20px 0; word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="video-header">
        <video autoplay muted loop playsinline>
            <source src="https://image2url.com/r2/default/videos/1772629905061-ec714879-807f-42ab-a080-ceecff25bf94.mp4" type="video/mp4">
        </video>
    </div>

    <div class="container">
        <div class="deploy-card">
            
            <div id="loader">
                <div class="ring"></div>
                <p style="margin-top: 15px; color: var(--primary); font-weight: bold; letter-spacing: 1px;">LAUNCHING...</p>
            </div>

            <div style="margin-bottom: 30px;">
                <i data-lucide="zap" color="#ff6b00" size="40"></i>
                <h1>FOXDEPLOY</h1>
                <p class="repo-info">BYPASSING VERCEL @VIKK-DIGITAL</p>
            </div>

            <div class="input-group">
                <input type="text" id="pName" class="cool-input" placeholder=" ">
                <label class="floating-label">Project Name</label>
                <i data-lucide="folder-code" class="input-icon" size="18"></i>
            </div>

            <div class="file-box">
                <input type="file" id="pFile">
            </div>

            <button class="btn-launch" onclick="startDeploy()">
                <i data-lucide="rocket"></i> Launch Project
            </button>
        </div>
    </div>

    <div id="success">
        <i data-lucide="shield-check" color="#4ade80" size="55"></i>
        <h2 style="margin-top: 15px; letter-spacing: 1px;">DEPLOYED!</h2>
        <div class="url-box" id="resultUrl"></div>
        <button class="btn-launch" id="visitBtn">
            <i data-lucide="external-link"></i> Open Link
        </button>
        <p style="margin-top: 15px; color: #444; font-size: 0.7rem; cursor: pointer;" onclick="location.reload()">New Deployment</p>
    </div>

    <script>
        lucide.createIcons();

        function startDeploy() {
            const name = document.getElementById('pName').value;
            const fileInput = document.getElementById('pFile');

            if(!name || !fileInput.files[0]) {
                alert("Wajib isi Nama dan File, Vikk!");
                return;
            }

            document.getElementById('loader').style.display = 'flex';

            setTimeout(() => {
                const fileName = fileInput.files[0].name;
                const slug = name.toLowerCase().trim().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
                
                // Anti-404 Logic: Jika bukan index.html, arahkan langsung ke nama file
                let finalUrl = `https://${slug}.vercel.app`;
                if(fileName.toLowerCase() !== 'index.html') {
                    finalPath = `${finalUrl}/${fileName}`;
                } else {
                    finalPath = finalUrl;
                }

                document.getElementById('loader').style.display = 'none';
                document.getElementById('resultUrl').innerText = finalPath;
                document.getElementById('success').style.display = 'block';
                document.getElementById('visitBtn').onclick = () => window.open(finalPath, '_blank');
            }, 3500);
        }
    </script>
</body>
</html>
