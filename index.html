<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoxDeploy | Ultimate Cloud Launcher</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #ff6b00; /* Oranye Utama */
            --primary-glow: rgba(255, 107, 0, 0.5);
            --primary-dim: rgba(255, 107, 0, 0.1);
            --bg-dark: #070707;
            --card-bg: rgba(15, 15, 15, 0.7);
            --text-main: #f0f0f0;
            --text-muted: #888;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #222, var(--bg-dark));
        }

        /* 1. VIDEO HEADER PERSEGI PANJANG (UPDATE URL) */
        .video-header {
            width: 100%; height: 200px; overflow: hidden; position: relative;
            border-bottom: 3px solid var(--primary);
            box-shadow: 0 5px 25px var(--primary-glow);
        }

        .video-header video {
            width: 100%; height: 100%; object-fit: cover;
            filter: brightness(0.8) contrast(1.1);
        }

        /* 2. LAYOUT TENGAH & CARD */
        .container {
            flex: 1; display: flex; justify-content: center; align-items: center;
            padding: 40px 20px; width: 100%;
        }

        .deploy-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 45px; border-radius: 24px;
            width: 100%; max-width: 460px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            text-align: center; position: relative; overflow: hidden;
        }

        .logo-area { margin-bottom: 35px; }
        .logo-area i {
            color: var(--primary); margin-bottom: 12px;
            filter: drop-shadow(0 0 8px var(--primary-glow));
        }

        h1 {
            font-size: 2.2rem; letter-spacing: 4px; text-transform: uppercase; font-weight: 900;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .subtitle { color: var(--text-muted); font-size: 0.9rem; letter-spacing: 1px; }

        /* 3. INPUT GROUP PROFESIONAL (FLOATING LABEL) */
        .input-group { position: relative; margin-bottom: 28px; text-align: left; }

        .cool-input {
            width: 100%; background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 15px 16px 50px; border-radius: 12px;
            color: white; font-size: 1rem; transition: var(--transition);
        }

        .cool-input:focus {
            outline: none; border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-dim);
        }

        .input-icon {
            position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); transition: var(--transition);
            pointer-events: none; z-index: 2;
        }

        .cool-input:focus ~ .input-icon { color: var(--primary); filter: drop-shadow(0 0 5px var(--primary-glow)); }

        .floating-label {
            position: absolute; left: 50px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); pointer-events: none; transition: var(--transition); z-index: 1;
        }

        .cool-input:focus ~ .floating-label,
        .cool-input:not(:placeholder-shown) ~ .floating-label {
            top: 0; left: 15px; font-size: 0.75rem; color: var(--primary);
            font-weight: bold; background: #111; padding: 0 8px; transform: translateY(-50%);
        }

        /* 4. FILE INPUT STYLING */
        .file-label { display: block; margin-bottom: 8px; font-size: 0.8rem; color: var(--primary); font-weight: bold; text-transform: uppercase; }
        .cool-file { width: 100%; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.05); padding: 12px; border-radius: 12px; color: var(--text-muted); cursor: pointer; }
        .cool-file::-webkit-file-upload-button { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 8px; margin-right: 12px; font-weight: bold; cursor: pointer; }

        /* 5. ACTION BUTTON */
        .btn-launch {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 18px; border-radius: 14px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 12px; transition: var(--transition); margin-top: 10px;
        }

        .btn-launch:hover { transform: translateY(-3px); box-shadow: 0 10px 25px var(--primary-glow); filter: brightness(1.1); }

        /* 6. LOADING ANIMATION */
        #loader {
            display: none; position: absolute; inset: 0; background: rgba(7, 7, 7, 0.95);
            z-index: 10; flex-direction: column; justify-content: center; align-items: center;
            border-radius: 24px; backdrop-filter: blur(10px);
        }

        .ring { width: 70px; height: 70px; border: 5px solid var(--primary-dim); border-top: 5px solid var(--primary); border-radius: 50%; animation: rotate 1s linear infinite; }
        @keyframes rotate { to { transform: rotate(360deg); } }

        /* 7. SUCCESS NOTIFICATION (KECE) */
        #successPopup {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: #111; border: 2px solid var(--primary);
            padding: 40px; border-radius: 24px; z-index: 100;
            width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.9), 0 0 25px var(--primary-glow);
            opacity: 0; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #successPopup.active { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }

        .link-box {
            background: #000; border: 1px dashed var(--primary);
            padding: 12px; border-radius: 10px; margin: 25px 0;
            display: flex; justify-content: space-between; align-items: center;
            color: #4ade80; font-family: 'Courier New', monospace; font-size: 0.9rem;
        }

        .copy-btn { background: var(--primary-dim); border: 1px solid var(--primary); color: var(--primary); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: bold; }
        .copy-btn:hover { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <div class="video-header">
        <video autoplay muted loop playsinline>
            <source src="https://image2url.com/r2/default/videos/1772629905061-ec714879-807f-42ab-a080-ceecff25bf94.mp4" type="video/mp4">
        </video>
    </div>

    <div class="container">
        <div class="deploy-card">
            
            <div id="loader">
                <div class="ring"></div>
                <p style="margin-top: 20px; color: var(--primary); font-weight: bold; letter-spacing: 2px;">SYNCING TO VERCEL...</p>
            </div>

            <div class="logo-area">
                <i data-lucide="zap" size="50"></i>
                <h1>FoxDeploy</h1>
                <p class="subtitle">Secure Professional Deployment</p>
            </div>

            <div class="input-group">
                <input type="text" id="pName" class="cool-input" placeholder=" ">
                <label class="floating-label">Project Name</label>
                <i data-lucide="folder-git-2" class="input-icon" size="20"></i>
            </div>

            <div class="input-group">
                <label class="file-label">Source Asset (HTML/ZIP)</label>
                <input type="file" id="pFile" class="cool-file">
            </div>

            <button class="btn-launch" onclick="handleDeploy()">
                <i data-lucide="rocket"></i> Launch Project
            </button>
        </div>
    </div>

    <div id="successPopup">
        <i data-lucide="check-circle" color="#4ade80" size="64" style="filter: drop-shadow(0 0 10px rgba(74, 222, 128, 0.4))"></i>
        <h2 style="margin: 20px 0 10px; font-weight: 900; letter-spacing: 1px;">DEPLOY SUCCESS!</h2>
        <p style="color: var(--text-muted);">Website kamu berhasil di-deploy. API Key aman di Environment Variable.</p>

        <div class="link-box">
            <span id="finalLink">https://vikk-project.vercel.app</span>
            <button class="copy-btn" onclick="copyAction()">
                <i data-lucide="copy" size="14" style="vertical-align: middle; margin-right: 4px;"></i>Copy
            </button>
        </div>

        <button class="btn-launch" onclick="visitLink()" style="background: transparent; border: 1px solid var(--primary); color: var(--primary); box-shadow: none;">
            <i data-lucide="external-link"></i> Enter Website
        </button>
    </div>

    <script>
        // Init Ikon
        lucide.createIcons();

        // Main Function
        async function handleDeploy() {
            const name = document.getElementById('pName').value;
            const file = document.getElementById('pFile').value;

            if(!name || !file) {
                alert("Wajib isi Nama Project dan pilih File, Vikk!");
                return;
            }

            // Tampilkan Loading
            document.getElementById('loader').style.display = 'flex';

            // Simulasi panggil backend Vercel API
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                
                // Buat slug otomatis
                const slug = name.toLowerCase().trim().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
                document.getElementById('finalLink').innerText = `https://${slug}.vercel.app`;
                
                // Tampilkan Popup
                document.getElementById('successPopup').classList.add('active');
            }, 3500);
        }

        // Action: Copy
        function copyAction() {
            const link = document.getElementById('finalLink').innerText;
            navigator.clipboard.writeText(link).then(() => {
                alert("Link berhasil disalin!");
            });
        }

        // Action: Visit
        function visitLink() {
            const url = document.getElementById('finalLink').innerText;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
